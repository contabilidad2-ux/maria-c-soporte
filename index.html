<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #ece5dd;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
  }

  #phone {
    width: 100%;
    max-width: 420px;
    height: 92vh;
    max-height: 760px;
    border-radius: 20px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    background: #e5ddd5;
  }

  #hdr {
    background: #075e54;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  #hdr-av {
    width: 40px; height: 40px; border-radius: 50%;
    background: #128c7e;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  #hdr-name { color: #fff; font-size: 15px; font-weight: 600; }
  #hdr-sub  { color: rgba(255,255,255,.75); font-size: 12px; }

  #msgs {
    flex: 1; overflow-y: auto;
    padding: 12px 10px 6px;
    display: flex; flex-direction: column; gap: 6px;
  }
  #msgs::-webkit-scrollbar { width: 3px; }
  #msgs::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); border-radius: 3px; }

  .bbl {
    max-width: 82%; padding: 8px 11px 5px;
    border-radius: 8px; font-size: 14px; line-height: 1.45; color: #111;
  }
  .bbl.bot { background: #fff; align-self: flex-start; border-top-left-radius: 2px; }
  .bbl.usr { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 2px; }
  .bbl .txt { white-space: pre-wrap; word-break: break-word; }
  .bbl .ts  { font-size: 11px; color: #999; text-align: right; margin-top: 3px; }
  .bbl.usr .ts { display: flex; align-items: center; justify-content: flex-end; gap: 3px; }
  .ck { color: #53bdeb; font-size: 12px; }

  .opts { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 7px; }
  .obtn {
    background: transparent; border: 1.5px solid #25d366; color: #075e54;
    border-radius: 20px; padding: 5px 14px; font-size: 13px;
    cursor: pointer; font-family: inherit;
    transition: background .15s, color .15s;
  }
  .obtn:hover  { background: #25d366; color: #fff; }
  .obtn:disabled { opacity: .4; cursor: default; }

  .sel-row { display: flex; flex-direction: column; gap: 6px; margin-top: 7px; }
  .sel-row select {
    font-family: inherit; font-size: 13px; border-radius: 8px;
    border: 1px solid #ccc; padding: 6px 10px; background: #fff; color: #111; width: 100%;
  }
  .sel-row button, .inp-row button {
    font-family: inherit; font-size: 13px; background: #075e54; color: #fff;
    border: none; border-radius: 20px; padding: 6px 16px; cursor: pointer; align-self: flex-start;
  }
  .sel-row button:hover, .inp-row button:hover { background: #128c7e; }

  .inp-row { display: flex; flex-direction: column; gap: 6px; margin-top: 7px; }
  .inp-row input, .inp-row select {
    font-family: inherit; font-size: 13px; border: 1px solid #ccc;
    border-radius: 8px; padding: 6px 10px; background: #fff; color: #111; width: 100%;
  }
  .inp-row button { margin-top: 2px; }

  .confirm-box {
    background: #f0f9f4; border: 1px solid #25d366;
    border-radius: 8px; padding: 9px 11px; margin-top: 7px; font-size: 13px; color: #111;
  }
  .confirm-box .lbl { color: #075e54; font-weight: 600; font-size: 11px; margin-bottom: 1px; }
  .confirm-box .val { margin-bottom: 5px; }
  .confirm-btns { display: flex; gap: 8px; margin-top: 7px; }
  .confirm-btns button {
    font-family: inherit; font-size: 13px; border-radius: 20px; padding: 5px 16px;
    cursor: pointer; border: 1.5px solid;
  }
  .btn-ok  { background: #075e54; color: #fff; border-color: #075e54; }
  .btn-ok:hover { background: #128c7e; }
  .btn-ko  { background: transparent; color: #c0392b; border-color: #c0392b; }
  .btn-ko:hover { background: #fdecea; }

  .typing {
    display: flex; align-items: center; gap: 4px;
    padding: 10px 13px; background: #fff; border-radius: 8px;
    align-self: flex-start; border-top-left-radius: 2px;
  }
  .dot {
    width: 7px; height: 7px; background: #aaa; border-radius: 50%;
    animation: bop .9s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: .15s; }
  .dot:nth-child(3) { animation-delay: .3s; }
  @keyframes bop {
    0%, 60%, 100% { transform: translateY(0); }
    30%           { transform: translateY(-5px); }
  }

  #bar {
    background: #f0f0f0; padding: 8px 10px;
    display: flex; align-items: center; gap: 8px;
    border-top: 1px solid #ddd; flex-shrink: 0;
  }
  #ti {
    flex: 1; border: none; background: #fff; border-radius: 20px;
    padding: 9px 14px; font-family: inherit; font-size: 14px;
    outline: none; color: #111;
  }
  #sb {
    width: 40px; height: 40px; border-radius: 50%; background: #25d366;
    border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background .15s;
  }
  #sb:hover { background: #1ebe5d; }
  #sb svg { width: 20px; height: 20px; fill: #fff; }

  .badge-ok { display: inline-block; background: #dcf8c6; color: #075e54; font-size: 12px; font-weight: 600; border-radius: 10px; padding: 2px 10px; margin-top: 5px; }
  .badge-pa { display: inline-block; background: #fff3cd; color: #856404; font-size: 12px; font-weight: 600; border-radius: 10px; padding: 2px 10px; margin-top: 5px; }

  @media (max-width: 480px) {
    body { padding: 0; align-items: flex-start; }
    #phone { height: 100vh; max-height: 100vh; border-radius: 0; }
  }
</style>
</head>

function gt(){
  const n=new Date();

function addMsg(txt, who, extras){
  const b=document.createElement('div'); b.className='bbl '+who;
  const p=document.createElement('div'); p.className='txt'; p.textContent=txt; b.appendChild(p);
  if(extras) b.appendChild(extras);

  else ts.textContent=gt();
  b.appendChild(ts); msgs.appendChild(b); scrollBot();
}

function mkOpts(opciones, cb){
  const row=document.createElement('div'); row.className='opts';
  opciones.forEach(o=>{
    const btn=document.createElement('button'); btn.className='obtn'; btn.textContent=o;
    btn.onclick=()=>{ row.querySelectorAll('button').forEach(b=>b.disabled=true); cb(o); };
    row.appendChild(btn);
  });
  return row;
}

function mkSelect(label, opciones, btnLabel, cb){
  const row=document.createElement('div'); row.className='sel-row';
  const lbl=document.createElement('div'); lbl.style.cssText='font-size:12px;color:#666;margin-bottom:2px'; lbl.textContent=label;
  const sel=document.createElement('select'); sel.innerHTML='<option value="">-- selecciona --</option>';
  opciones.forEach(o=>{ const opt=document.createElement('option'); opt.value=o; opt.textContent=o; sel.appendChild(opt); });
  const btn=document.createElement('button'); btn.textContent=btnLabel;
  btn.onclick=()=>{ if(!sel.value) return; disableAll(row); cb(sel.value); };
  row.appendChild(lbl); row.appendChild(sel); row.appendChild(btn); return row;
}

function mkInputForm(campos, btnLabel, cb){
  const row=document.createElement('div'); row.className='inp-row'; const inputs={};
  campos.forEach(c=>{
    const lbl=document.createElement('div'); lbl.style.cssText='font-size:12px;color:#666;margin-bottom:1px'; lbl.textContent=c.label;
    let el;
    if(c.type==='select'){ el=document.createElement('select'); el.innerHTML='<option value="">-- selecciona --</option>'; c.opts.forEach(o=>{ const opt=document.createElement('option'); opt.value=o; opt.textContent=o; el.appendChild(opt); }); }
    else { el=document.createElement('input'); el.type=c.type||'text'; el.placeholder=c.placeholder||''; }
    inputs[c.key]=el; row.appendChild(lbl); row.appendChild(el);
  });
  const btn=document.createElement('button'); btn.textContent=btnLabel;
  btn.onclick=()=>{
    const vals={};
    for(const k in inputs){ if(!inputs[k].value){ inputs[k].style.borderColor='#e24b4a'; return; } vals[k]=inputs[k].value; }
    disableAll(row); cb(vals);
  };
  row.appendChild(btn); return row;
}

function mkConfirm(filas, cbOk, cbKo){
  const box=document.createElement('div'); box.className='confirm-box';
  filas.forEach(f=>{
    const lbl=document.createElement('div'); lbl.className='lbl'; lbl.textContent=f.label;
    const val=document.createElement('div'); val.className='val'; val.textContent=f.val;
    box.appendChild(lbl); box.appendChild(val);
  });
  const btns=document.createElement('div'); btns.className='confirm-btns';
  const ok=document.createElement('button'); ok.className='btn-ok'; ok.textContent='Confirmar';
  const ko=document.createElement('button'); ko.className='btn-ko'; ko.textContent='Cancelar';
  ok.onclick=()=>{ ok.disabled=true; ko.disabled=true; ok.style.opacity='.5'; ko.style.opacity='.5'; cbOk(); };
  ko.onclick=()=>{ ok.disabled=true; ko.disabled=true; ok.style.opacity='.5'; ko.style.opacity='.5'; cbKo(); };
  btns.appendChild(ok); btns.appendChild(ko); box.appendChild(btns); return box;
}

function disableAll(row){ row.querySelectorAll('input,select,button').forEach(e=>{ e.disabled=true; e.style.opacity='.5'; }); }

async function iniciar(){
  await botReply('Hola 👋 Por favor, introduce tu código de vendedor.', 800);
  state.fase='login';
}

async function handleLogin(cod){
  const num=parseInt(cod);
  const nombre=VENDEDORES[num];
  if(!nombre){ await botReply('Código no reconocido. Inténtalo de nuevo.', 600); return; }
  state.nombre=nombre;
  state.fase='saludo';
  await botReply('Hola '+nombre+' 👋 ¿qué tal estás?', 800);
  await new Promise(r=>setTimeout(r,500));
  await botReply('¿En qué tienda estás hoy?', 700);
  state.fase='tienda';
}

async function handleTienda(txt){
  state.tienda=txt;
  document.getElementById('hdr-sub').textContent=txt;
  await botReply('Perfecto 👍', 700);
  await new Promise(r=>setTimeout(r,400));
  state.fase='menu';
  await botReply('¿Qué necesitas gestionar hoy?', 600,
    mkOpts(['Abrir técnico de proveedor','Corregir cobro erróneo'], handleMenu));
}

function handleMenu(op){ addMsg(op,'usr'); if(op==='Abrir técnico de proveedor') flujoTecnico(); else flujoCobroP1(); }

async function flujoTecnico(){
  state.flujo='tecnico'; state.fase='tec_prov';
  await botReply('Selecciona el proveedor:', 600,
    mkSelect('Proveedor', Object.keys(PROVEEDORES), 'Siguiente →', v=>{ addMsg(v,'usr'); state.tecnico.proveedor=v; flujoTecnicoP2(v); }));
}

async function flujoTecnicoP2(prov){
  state.fase='tec_tec';
  await botReply('Selecciona el técnico de '+prov+':', 600,
    mkSelect('Técnico', PROVEEDORES[prov], 'Siguiente →', v=>{ addMsg(v,'usr'); state.tecnico.tecnico=v; flujoTecnicoConfirm(); }));
}

async function flujoTecnicoConfirm(){
  state.fase='tec_confirm';
  await botReply('Revisa los datos:', 600,
    mkConfirm([
      {label:'Vendedor', val:state.nombre},
      {label:'Tienda', val:state.tienda},
      {label:'Proveedor', val:state.tecnico.proveedor},
      {label:'Técnico', val:state.tecnico.tecnico}
    ],
    async()=>{ addMsg('Confirmar','usr'); await botReply('Enviando a Power Automate...', 700); await botReply('Técnico abierto correctamente. El robot procesa la apertura en el ERP.', 1200, (()=>{const d=document.createElement('div');d.innerHTML='<span class="badge-pa">⚡ PA en proceso</span>';return d;})() ); flujoFin(); },
    async()=>{ addMsg('Cancelar','usr'); await botReply('Cancelado. ¿Qué más necesitas?', 600, mkOpts(['Abrir técnico de proveedor','Corregir cobro erróneo','Nada, gracias'], handleMenu2)); }
    ));
}

async function flujoCobroP1(){
  state.flujo='cobro'; state.fase='cobro_datos';
  await botReply('Introduce los datos del cobro erróneo:', 700,
    mkInputForm([
      {key:'localizador', label:'Nº localizador', placeholder:'Ej: LOC-20240512-001'},
      {key:'tipoPagoMal', label:'Tipo de pago erróneo', type:'select', opts:TIPOS_PAGO},
      {key:'importeMal', label:'Importe erróneo €', type:'number', placeholder:'0.00'}
    ], 'Siguiente →', vals=>{ addMsg('Loc: '+vals.localizador+' | '+vals.tipoPagoMal+' | '+vals.importeMal+'€','usr'); Object.assign(state.cobro,vals); flujoCobroP2(); }));
}

async function flujoCobroP2(){
  state.fase='cobro_correcto';
  await botReply('Ahora los datos correctos:', 700,
    mkInputForm([
      {key:'tipoPagoBien', label:'Tipo de pago correcto', type:'select', opts:TIPOS_PAGO},
      {key:'importeBien', label:'Importe correcto €', type:'number', placeholder:'0.00'}
    ], 'Siguiente →', vals=>{ addMsg(vals.tipoPagoBien+' | '+vals.importeBien+'€','usr'); Object.assign(state.cobro,vals); flujoCobroConfirm(); }));
}

async function flujoCobroConfirm(){
  state.fase='cobro_confirm';
  await botReply('Revisa la corrección:', 700,
    mkConfirm([
      {label:'Vendedor', val:state.nombre},
      {label:'Tienda', val:state.tienda},
      {label:'Nº localizador', val:state.cobro.localizador},
      {label:'Pago erróneo', val:state.cobro.tipoPagoMal+' — '+state.cobro.importeMal+'€'},
      {label:'Pago correcto', val:state.cobro.tipoPagoBien+' — '+state.cobro.importeBien+'€'}
    ],
    async()=>{ addMsg('Confirmar','usr'); await botReply('Incidencia registrada. El equipo la corregirá en el ERP.\nNº INC-'+Date.now().toString().slice(-6), 1000, (()=>{const d=document.createElement('div');d.innerHTML='<span class="badge-ok">✓ Registrada</span>';return d;})() ); flujoFin(); },
    async()=>{ addMsg('Cancelar','usr'); await botReply('Cancelado. ¿Qué más necesitas?', 600, mkOpts(['Abrir técnico de proveedor','Corregir cobro erróneo','Nada, gracias'], handleMenu2)); }
    ));
}

async function flujoFin(){
  state.fase='fin';
  await botReply('¿Necesitas algo más?', 900, mkOpts(['Abrir técnico de proveedor','Corregir cobro erróneo','Nada, gracias'], handleMenu2));
}

async function handleMenu2(op){
  addMsg(op,'usr');
  if(op==='Nada, gracias') await botReply('Hasta pronto, '+state.nombre+' 👋', 700);
  else handleMenu(op);
}

function handleInput(){
  const txt=ti.value.trim(); if(!txt) return; ti.value='';
  if(state.fase==='login'){ addMsg(txt,'usr'); handleLogin(txt); }
  else if(state.fase==='tienda'){ addMsg(txt,'usr'); handleTienda(txt); }
  else { addMsg(txt,'usr'); botReply('Usa los botones del chat para navegar.', 500); }
}

sb.onclick=handleInput;
ti.addEventListener('keydown', e=>{ if(e.key==='Enter') handleInput(); });
setTimeout(iniciar, 500);
</script>
