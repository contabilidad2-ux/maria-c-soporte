<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>MARIA_C — Soporte Operativo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
*{-webkit-tap-highlight-color:transparent}
html{height:100%;height:-webkit-fill-available}
body{font-family:'Nunito',sans-serif;background:#ece5dd;display:flex;justify-content:center;align-items:center;min-height:100vh;min-height:-webkit-fill-available;overflow:hidden}

/* MOBILE */
#app{width:100%;max-width:420px;height:100vh;height:100dvh;display:flex;flex-direction:column;background:#e5ddd5;overflow:hidden}

/* DESKTOP: WhatsApp Web layout */
@media(min-width:768px){
  body{padding:0}
  #app{max-width:100%;width:100%;height:100vh;flex-direction:row;border-radius:0}
  #sidebar{width:360px;min-width:300px;flex-shrink:0;background:#fff;display:flex;flex-direction:column;border-right:1px solid #e0e0e0}
  #sidebar-hdr{background:#075e54;padding:14px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
  #sidebar-av{width:40px;height:40px;border-radius:50%;background:#128c7e;display:flex;align-items:center;justify-content:center;font-size:18px}
  #sidebar-title{color:#fff;font-size:15px;font-weight:600}
  #sidebar-sub{color:rgba(255,255,255,.75);font-size:12px}
  #chat-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #f0f0f0;cursor:default;background:#f0f9f4}
  #chat-item-av{width:46px;height:46px;border-radius:50%;background:#075e54;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
  #chat-item-info{flex:1}
  #chat-item-name{font-size:15px;font-weight:600;color:#111}
  #chat-item-msg{font-size:13px;color:#666}
  #phone{flex:1;display:flex;flex-direction:column;height:100vh}
}
@media(max-width:767px){
  #sidebar{display:none}
  #app{max-width:100%}
}

#hdr{background:#075e54;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
#hdr-av{width:40px;height:40px;border-radius:50%;background:#128c7e;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
#hdr-name{color:#fff;font-size:15px;font-weight:600}
#hdr-sub{color:rgba(255,255,255,.75);font-size:12px}
#msgs{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 10px 6px;display:flex;flex-direction:column;gap:6px;background:#e5ddd5;-webkit-overflow-scrolling:touch}
#msgs::-webkit-scrollbar{width:3px}
#msgs::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:3px}
.bbl{max-width:75%;padding:8px 11px 5px;border-radius:8px;font-size:14px;line-height:1.45;color:#111}
.bbl.bot{background:#fff;align-self:flex-start;border-top-left-radius:2px}
.bbl.usr{background:#dcf8c6;align-self:flex-end;border-top-right-radius:2px}
.bbl .txt{white-space:pre-wrap;word-break:break-word}
.bbl .ts{font-size:11px;color:#999;text-align:right;margin-top:3px}
.bbl.usr .ts{display:flex;align-items:center;justify-content:flex-end;gap:3px}
.ck{color:#53bdeb;font-size:12px}
.opts{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
.obtn{background:transparent;border:1.5px solid #25d366;color:#075e54;border-radius:20px;padding:5px 14px;font-size:13px;cursor:pointer;font-family:inherit;transition:background .15s,color .15s}
.obtn:hover{background:#25d366;color:#fff}
.obtn:disabled{opacity:.4;cursor:default}
.sel-row,.inp-row{display:flex;flex-direction:column;gap:6px;margin-top:7px}
.sel-row select,.inp-row input,.inp-row select{font-family:inherit;font-size:13px;border-radius:8px;border:1px solid #ccc;padding:6px 10px;background:#fff;color:#111;width:100%}
.sel-row button,.inp-row button{font-family:inherit;font-size:13px;background:#075e54;color:#fff;border:none;border-radius:20px;padding:6px 16px;cursor:pointer;align-self:flex-start}
.sel-row button:hover,.inp-row button:hover{background:#128c7e}
.inp-row button{margin-top:2px}
.confirm-box{background:#f0f9f4;border:1px solid #25d366;border-radius:8px;padding:9px 11px;margin-top:7px;font-size:13px;color:#111}
.confirm-box .lbl{color:#075e54;font-weight:600;font-size:11px;margin-bottom:1px}
.confirm-box .val{margin-bottom:5px}
.confirm-btns{display:flex;gap:8px;margin-top:7px}
.confirm-btns button{font-family:inherit;font-size:13px;border-radius:20px;padding:5px 16px;cursor:pointer;border:1.5px solid}
.btn-ok{background:#075e54;color:#fff;border-color:#075e54}
.btn-ok:hover{background:#128c7e}
.btn-ko{background:transparent;color:#c0392b;border-color:#c0392b}
.btn-ko:hover{background:#fdecea}
.typing{display:flex;align-items:center;gap:4px;padding:10px 13px;background:#fff;border-radius:8px;align-self:flex-start;border-top-left-radius:2px}
.dot{width:7px;height:7px;background:#aaa;border-radius:50%;animation:bop .9s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}
@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
#bar{background:#f0f0f0;padding:8px 10px;display:flex;align-items:center;gap:8px;border-top:1px solid #ddd;flex-shrink:0}
#ti{flex:1;border:none;background:#fff;border-radius:20px;padding:9px 14px;font-family:inherit;font-size:16px;outline:none;color:#111}
#sb{width:40px;height:40px;border-radius:50%;background:#25d366;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
#sb:hover{background:#1ebe5d}
#sb svg{width:20px;height:20px;fill:#fff}
.badge-ok{display:inline-block;background:#dcf8c6;color:#075e54;font-size:12px;font-weight:600;border-radius:10px;padding:2px 10px;margin-top:5px}
.match-list{display:flex;flex-direction:column;gap:5px;margin-top:7px}
.match-btn{background:#f0f9f4;border:1.5px solid #25d366;color:#075e54;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit;text-align:left;transition:background .15s}
.match-btn:hover{background:#25d366;color:#fff}
.match-btn span{display:block;font-size:10px;opacity:.7;margin-top:1px}
</style>
</head>

function scrollBot(){msgs.scrollTop=msgs.scrollHeight;}
function addMsg(txt,who,extras){

  if(extras)b.appendChild(extras);

  if(who==='usr')ts.innerHTML=gt()+' <span class="ck">✓✓</span>';

function disableAll(row){row.querySelectorAll('input,select,button').forEach(e=>{e.disabled=true;e.style.opacity='.5';});}
function mkOpts(ops,cb){
  const row=document.createElement('div');row.className='opts';
  ops.forEach(o=>{const btn=document.createElement('button');btn.className='obtn';btn.textContent=o;btn.onclick=()=>{row.querySelectorAll('button').forEach(b=>b.disabled=true);cb(o);};row.appendChild(btn);});
  return row;
}
function mkSelect(label,ops,btnLabel,cb){
  const row=document.createElement('div');row.className='sel-row';
  const lbl=document.createElement('div');lbl.style.cssText='font-size:11px;color:#666;margin-bottom:2px';lbl.textContent=label;
  const sel=document.createElement('select');sel.innerHTML='<option value="">-- selecciona --</option>';
  ops.forEach(o=>{const opt=document.createElement('option');opt.value=JSON.stringify(o);opt.textContent=o.desc?'['+o.id+'] '+o.desc:o;sel.appendChild(opt);});
  const btn=document.createElement('button');btn.textContent=btnLabel;
  btn.onclick=()=>{if(!sel.value)return;disableAll(row);cb(JSON.parse(sel.value));};
  row.appendChild(lbl);row.appendChild(sel);row.appendChild(btn);return row;
}
function mkInputForm(campos,btnLabel,cb){
  const row=document.createElement('div');row.className='inp-row';const inputs={};
  campos.forEach(c=>{
    const lbl=document.createElement('div');lbl.style.cssText='font-size:11px;color:#666;margin-bottom:1px';lbl.textContent=c.label;
    let el;
    if(c.type==='select'){el=document.createElement('select');el.innerHTML='<option value="">-- selecciona --</option>';c.opts.forEach(o=>{const opt=document.createElement('option');opt.value=o;opt.textContent=o;el.appendChild(opt);});}
    else{el=document.createElement('input');el.type=c.type||'text';el.placeholder=c.placeholder||'';}
    inputs[c.key]=el;row.appendChild(lbl);row.appendChild(el);
  });
  const btn=document.createElement('button');btn.textContent=btnLabel;
  btn.onclick=()=>{const vals={};for(const k in inputs){if(!inputs[k].value){inputs[k].style.borderColor='#e24b4a';return;}vals[k]=inputs[k].value;}disableAll(row);cb(vals);};
  row.appendChild(btn);return row;
}
function mkConfirm(filas,cbOk,cbKo){
  const box=document.createElement('div');box.className='confirm-box';
  filas.forEach(f=>{const lbl=document.createElement('div');lbl.className='lbl';lbl.textContent=f.label;const val=document.createElement('div');val.className='val';val.textContent=f.val;box.appendChild(lbl);box.appendChild(val);});
  const btns=document.createElement('div');btns.className='confirm-btns';
  const ok=document.createElement('button');ok.className='btn-ok';ok.textContent='Confirmar';
  const ko=document.createElement('button');ko.className='btn-ko';ko.textContent='Cancelar';
  ok.onclick=()=>{ok.disabled=true;ko.disabled=true;ok.style.opacity='.5';ko.style.opacity='.5';cbOk();};
  ko.onclick=()=>{ok.disabled=true;ko.disabled=true;ok.style.opacity='.5';ko.style.opacity='.5';cbKo();};
  btns.appendChild(ok);btns.appendChild(ko);box.appendChild(btns);return box;
}

function identificarTienda(txt){
  const q=txt.trim().toUpperCase();
  for(const cod in TIENDAS){
    const aliases=TIENDAS[cod];
    for(const a of aliases){
      if(q.includes(a.toUpperCase()))return cod;
    }
  }
  return null;
}
function nombreTienda(cod){
  const aliases=TIENDAS[cod];

async function handleBuscaProveedor(txt){

  addMsg(txt,'usr');
  const row=document.createElement('div');row.className='match-list';
  matches.slice(0,6).forEach(m=>{
    const btn=document.createElement('button');btn.className='match-btn';

  });

  state.fase='cobro_tipo_bien';
  await botReply('\u00bfY cu\u00e1l ser\u00eda el tipo de pago correcto?',800,
    mkSelect('Tipo de pago correcto',TIPOS_PAGO,'Siguiente \u2192',v=>{
      addMsg(v,'usr');
      state.cobro.tipoPagoBien=v;
      flujoCobroP3();
    }));
}
async function flujoCobroP3(){
  state.fase='cobro_mismo_importe';
  await botReply('El importe que hab\u00eda era '+state.cobro.importeMal+'\u20ac, \u00bfes el correcto tambi\u00e9n?',900,
    mkOpts(['S\u00ed, mismo importe','No, es diferente'],async(op)=>{
      addMsg(op,'usr');
      if(op==='S\u00ed, mismo importe'){
        state.cobro.importeBien=state.cobro.importeMal;
        state.cobro.autorizacion=null;
        flujoCobroConfirm();
      } else {
        state.fase='cobro_autorizacion';
        await botReply('Llama a Pilar para que te d\u00e9 una autorizaci\u00f3n y escr\u00edbela aqu\u00ed:',800);
      }
    }));
}
async function handleAutorizacion(txt){
  if(!txt.toUpperCase().includes('PAC')){
    await botReply('Lo que has escrito no coincide con una autorizaci\u00f3n para este tipo, revisa lo que has puesto.',600);
    return;
  }
  addMsg(txt,'usr');
  state.cobro.autorizacion=txt;
  state.fase='cobro_importe_bien';
  await botReply('Perfecto \uD83D\uDC4D Ahora dime el importe correcto:',700,
    mkInputForm([
      {key:'importeBien',label:'Importe correcto \u20ac',type:'text',placeholder:'0.00'}
    ],'Siguiente \u2192',vals=>{
      addMsg(vals.importeBien+'\u20ac','usr');
      state.cobro.importeBien=vals.importeBien;
      flujoCobroConfirm();
    }));
}
async function flujoCobroConfirm(){
  state.fase='cobro_confirm';
  const filas=[
    {label:'Vendedor',val:state.nombre},
    {label:'Tienda',val:state.tienda},
    {label:'N\u00ba localizador',val:state.cobro.localizador},
    {label:'Pago err\u00f3neo',val:state.cobro.tipoPagoMal+' \u2014 '+state.cobro.importeMal+'\u20ac'},
    {label:'Pago correcto',val:state.cobro.tipoPagoBien+' \u2014 '+state.cobro.importeBien+'\u20ac'}
  ];
  if(state.cobro.autorizacion)filas.push({label:'Autorizaci\u00f3n PAC',val:state.cobro.autorizacion});
  await botReply('D\u00e9jame ver...',600);
  await new Promise(r=>setTimeout(r,1000));
  await botReply('Perfecto, \u00e9chale un ojo antes de confirmar:',700,mkConfirm(
    filas,
    async()=>{addMsg('Confirmar','usr');await new Promise(r=>setTimeout(r,600));await botReply('Me pongo con el cambio ahora mismo, t\u00fa no toques nada, ya me encargo yo.',800);await new Promise(r=>setTimeout(r,1000));await botReply('En un momento estar\u00e1 actualizado en EXPOWIN \uD83D\uDC4D',700);flujoFin();},
    async()=>{addMsg('Cancelar','usr');await botReply('Cancelado.',600,mkOpts(['Abrir t\u00e9cnico de proveedor','Corregir cobro err\u00f3neo','Nada, gracias'],handleMenu2));}
  ));
}
async function flujoFin(){state.fase='fin';await botReply('\u00bfTe puedo ayudar con algo m\u00e1s?',900,mkOpts(['Abrir t\u00e9cnico de proveedor','Corregir cobro err\u00f3neo','No, gracias'],handleMenu2));}
async function handleMenu2(op){
  addMsg(op,'usr');
  if(op==='No, gracias'){
    const despedidas=[
      '\u00a1Hasta luego '+state.nombre+'! Cualquier cosa ya sabes \uD83D\uDC4B',
      'Hasta pronto '+state.nombre+', que vaya bien el d\u00eda \uD83D\uDC4B',
      '\u00a1Venga, hasta la pr\u00f3xima '+state.nombre+'! \uD83D\uDC4B',
      'Un saludo '+state.nombre+'\u00a1Hasta pronto! \uD83D\uDC4B'
    ];
    await botReply(despedidas[Math.floor(Math.random()*despedidas.length)],700);
  } else handleMenu(op);
}
function handleInput(){
  const txt=ti.value.trim();if(!txt)return;ti.value='';
  if(state.fase==='login'){addMsg(txt,'usr');handleLogin(txt);}
  else if(state.fase==='tienda'){handleTienda(txt);}
  else if(state.fase==='tec_busca'){handleBuscaProveedor(txt);}
  else if(state.fase==='cobro_autorizacion'){handleAutorizacion(txt);}
  else if(state.fase==='tec_autorizacion'){handleTecnicoAutorizacion(txt);}
  else{addMsg(txt,'usr');botReply('Usa los botones del chat para navegar.',500);}
}
sb.onclick=handleInput;
ti.addEventListener('keydown',e=>{if(e.key==='Enter')handleInput();});
setTimeout(iniciar,500);
</script>
